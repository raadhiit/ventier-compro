name: ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  ci:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.4'
          - '8.5'

    env:
      COMPOSER_NO_INTERACTION: '1'
      COMPOSER_PROCESS_TIMEOUT: '0'

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, dom, xml, fileinfo, sqlite3, pdo_sqlite
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create environment file
        run: cp .env.example .env

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install PHP dependencies
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --optimize-autoloader

      - name: Check PHP platform requirements
        run: composer check-platform-reqs

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate application key
        run: php artisan key:generate --ansi

      - name: Build frontend assets
        run: npm run build

      - name: Check PHP formatting
        run: composer lint:check

      - name: Run static analysis
        run: composer types:check

      - name: Run automated tests
        run: php artisan test